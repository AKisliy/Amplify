apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: temporal-external-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-store
  target:
    name: temporal-db-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.secrets.dbPassword.key }}
