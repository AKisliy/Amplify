apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: userservice-secrets
spec:
  refreshInterval: 1h            
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-store            
  target:
    name: {{ .Values.secret.name }}
    creationPolicy: Owner
  data:
  - secretKey: ConnectionStrings__UserServiceDb 
    remoteRef:
      key: {{ .Values.secrets.connectionString.key }}
      {{- if .Values.secrets.connectionString.version -}}
      version: .Values.secrets.connectionStringVersion
      {{- end }}
  - secretKey: MailOptions__ApiKey
    remoteRef:
      key: {{ .Values.secrets.mailApiKey.key }}
      {{- if .Values.secrets.mailApiKey.version -}}
      version: .Values.secrets.mailApiKey.version
      {{- end }}
