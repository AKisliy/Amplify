name: Deploy PR to Test Env (K8s)

on:
    pull_request:
        types: [opened, synchronize, reopened]
        branches: [main, develop]

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            userservice: ${{ steps.filter.outputs.userservice }}
            publisher: ${{ steps.filter.outputs.publisher }}
            media-ingest: ${{ steps.filter.outputs.media-ingest }}
            ws-gateway: ${{ steps.filter.outputs.ws-gateway }}
            video-editor: ${{ steps.filter.outputs.video-editor }}
            template-service: ${{ steps.filter.outputs.template-service }}
            ai-gateway: ${{ steps.filter.outputs.ai-gateway }}
        steps:
            - uses: actions/checkout@v4
              with:
                  # fetch-depth: 2 is required for HEAD^1 comparison on synchronize events
                  fetch-depth: 2
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  # On 'synchronize' (new commit pushed) compare only the last commit so that
                  # only services touched by that commit are re-deployed, not the entire PR diff.
                  # On 'opened'/'reopened' compare against the base branch to catch everything
                  # that needs an initial deploy.
                  base: ${{ github.event.action == 'synchronize' && 'HEAD^1' || github.base_ref }}
                  filters: |
                      userservice:
                        - 'userservice/**'
                        - 'helmfile.yaml'
                      publisher:
                        - 'publisher/**'
                      media-ingest:
                        - 'media-ingest/**'
                      ws-gateway:
                        - 'websocket-gateway/**'
                      video-editor:
                        - 'video-editor/**'
                      template-service:
                        - 'template-service/**'
                      ai-gateway:
                        - 'ai-gateway/**'

    deploy-userservice:
        needs: changes
        if: ${{ needs.changes.outputs.userservice == 'true' }}
        uses: ./.github/workflows/deploy-template.yaml
        with:
            service_folder: "userservice"
            app_label: "userservice"
            image_tag_var_name: "USERSERVICE_IMAGE_TAG"
            env_name: "stage"
            with_migrations: true
        secrets: inherit

    deploy-publisher:
        needs: changes
        if: ${{ needs.changes.outputs.publisher == 'true' }}
        uses: ./.github/workflows/deploy-template.yaml
        with:
            service_folder: "publisher"
            app_label: "publisher"
            image_tag_var_name: "PUBLISHER_IMAGE_TAG"
            env_name: "stage"
            with_migrations: true
        secrets: inherit

    deploy-media-ingest:
        needs: changes
        if: ${{ needs.changes.outputs.media-ingest == 'true' }}
        uses: ./.github/workflows/deploy-template.yaml
        with:
            service_folder: "media-ingest"
            app_label: "media-ingest"
            image_tag_var_name: "MEDIA_INGEST_IMAGE_TAG"
            env_name: "stage"
            with_migrations: true
        secrets: inherit

    deploy-websocket-gateway:
        needs: changes
        if: ${{ needs.changes.outputs.ws-gateway == 'true'}}
        uses: ./.github/workflows/deploy-template.yaml
        with:
            service_folder: "websocket-gateway"
            app_label: "ws-gateway"
            image_tag_var_name: "WS_GATEWAY_IMAGE_TAG"
            env_name: "stage"
        secrets: inherit

    deploy-video-editor:
        needs: changes
        if: ${{ needs.changes.outputs.video-editor == 'true' }}
        uses: ./.github/workflows/deploy-template.yaml
        with:
            service_folder: "video-editor"
            app_label: "video-editor"
            image_tag_var_name: "VIDEO_EDITOR_IMAGE_TAG"
            env_name: "stage"
        secrets: inherit

    deploy-template-service:
        needs: changes
        if: ${{ needs.changes.outputs.template-service == 'true' }}
        uses: ./.github/workflows/deploy-template.yaml
        with:
            service_folder: "template-service"
            app_label: "template-service"
            image_tag_var_name: "TEMPLATE_SERVICE_IMAGE_TAG"
            env_name: "stage"
        secrets: inherit

    deploy-ai-gateway:
        needs: changes
        if: ${{ needs.changes.outputs.ai-gateway == 'true' }}
        uses: ./.github/workflows/deploy-template.yaml
        with:
            service_folder: "ai-gateway"
            app_label: "ai-gateway"
            image_tag_var_name: "AI_GATEWAY_IMAGE_TAG"
            env_name: "stage"
        secrets: inherit
