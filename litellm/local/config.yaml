litellm_settings:
  # Disable Langfuse locally — no need for cost tracking during dev.
  # To enable: add success_callback/failure_callback and set LANGFUSE_* env vars.
  drop_params: true

default_vertex_config:
  vertex_project: "project-d72a81f9-0097-4b5b-a62"
  vertex_location: "global"
  vertex_credentials: "/secrets/sa-key.json"

general_settings:
  master_key: "sk-1234"
