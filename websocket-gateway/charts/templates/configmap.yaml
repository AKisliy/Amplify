apiVersion: v1
kind: ConfigMap
metadata:
  name: ws-gateway-config
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-7"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  "appsettings_override.json": |
    {{- .Values.appConfig | toPrettyJson | nindent 4 }}