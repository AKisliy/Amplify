environment: Staging

secrets:
  rabbitMqConnection:
    key: rabbitmq-test
  telegram:
    botToken:
      key: telegram-bot-token-test
    webhookUrl:
      key: telegram-webhook-url-test
    botUsername:
      key: telegram-bot-username-test

volumeMounts:
  - name: config-volume
    mountPath: /app/appsettings.Staging.json
    subPath: appsettings_override.json
  
appConfig:
  BasePath: /ws-gateway
  Logging:
    LogLevel: 
      Default: Information
      Microsoft.AspNetCore: Warning
  RabbitMQ:
    Url: ""
  CorsOptions:
    AllowedOrigins:
      - "https://localhost:3000"
    DefaultPolicyName: "StageCorsPolicy"
  Jwt:
    Issuer: "http://userservice.test-env.svc.cluster.local/userservice/api/auth"
    Audience: "MyAppDevelopmentUsers"
